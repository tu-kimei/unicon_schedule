server {
    listen 80;
    server_name localhost;

    # Gzip compression configuration
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;
    
    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html;

    # Max upload size
    client_max_body_size 10M;

    # API, Auth, and Operations endpoints - proxy to backend
    location ~ ^/(api|auth|operations)/ {
        proxy_pass http://app:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Uploads - serve directly from project's public directory
    location /uploads/ {
        alias /root/.openclaw/workspace/unicon_schedule/public/uploads/;
        expires 1y;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Static assets - serve from nginx with caching
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other routes - serve index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Favicon and manifest
    location = /favicon.ico {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public";
    }

    location = /manifest.json {
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public";
    }
}
